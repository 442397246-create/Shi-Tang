<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存管理 - 食堂管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <aside class="w-64 bg-white shadow-md flex-shrink-0">
            <div class="p-4 border-b"><h1 class="text-xl font-bold text-gray-800 flex items-center"><i class="fas fa-utensils mr-2 text-blue-600"></i>食堂管理系统</h1></div>
            <nav class="p-2" id="sidebar-nav"></nav>
        </aside>
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm border-b flex-shrink-0">
                <div class="flex items-center justify-between p-4">
                    <div class="flex items-center"><h2 class="text-lg font-semibold text-gray-800">库存管理</h2><span class="ml-4 text-sm text-gray-500">食材库存、出入库记录与预警</span></div>
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <i class="fas fa-bell text-xl text-gray-500"></i>
                            <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-4 h-4 flex items-center justify-center rounded-full" id="alert-count">0</span>
                        </div>
                        <div class="relative" id="user-dropdown-container">
                            <button onclick="toggleUserDropdown()" class="flex items-center space-x-2 hover:bg-gray-100 rounded-md py-2 px-3 transition-colors">
                                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
                                    <i class="fas fa-user text-blue-600"></i>
                                </div>
                                <span class="text-sm font-medium text-gray-700" id="current-user">管理员</span>
                                <i class="fas fa-chevron-down text-xs text-gray-500"></i>
                            </button>
                            <div id="user-dropdown" class="absolute right-0 top-full mt-1 w-48 bg-white rounded-md shadow-lg border hidden z-50">
                                <div class="py-1">
                                    <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 flex items-center">
                                        <i class="fas fa-sign-out-alt mr-2 text-red-500"></i> 退出登录
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            <main class="flex-1 overflow-y-auto p-6">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex space-x-2">
                        <button onclick="openStockOut()" class="px-4 py-2 border rounded-md text-sm text-gray-700 bg-white hover:bg-gray-50"><i class="fas fa-arrow-down mr-1"></i>出库登记</button>
                        <button onclick="openStockIn()" class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700"><i class="fas fa-arrow-up mr-1"></i>入库登记</button>
                    </div>
                </div>

                <div class="grid grid-cols-4 gap-4 mb-6">
                    <div class="bg-white rounded-lg shadow-sm p-4"><div class="flex items-center"><div class="w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center"><i class="fas fa-cubes text-white"></i></div><div class="ml-3"><p class="text-sm text-gray-500">总库存品类</p><p class="text-xl font-semibold" id="stat-total-items">0</p></div></div></div>
                    <div class="bg-white rounded-lg shadow-sm p-4"><div class="flex items-center"><div class="w-10 h-10 bg-green-500 rounded-lg flex items-center justify-center"><i class="fas fa-dollar-sign text-white"></i></div><div class="ml-3"><p class="text-sm text-gray-500">库存总价值</p><p class="text-xl font-semibold" id="stat-total-value">¥0</p></div></div></div>
                    <div class="bg-white rounded-lg shadow-sm p-4"><div class="flex items-center"><div class="w-10 h-10 bg-red-500 rounded-lg flex items-center justify-center"><i class="fas fa-exclamation-triangle text-white"></i></div><div class="ml-3"><p class="text-sm text-gray-500">库存不足</p><p class="text-xl font-semibold" id="stat-low-stock">0</p></div></div></div>
                    <div class="bg-white rounded-lg shadow-sm p-4"><div class="flex items-center"><div class="w-10 h-10 bg-yellow-500 rounded-lg flex items-center justify-center"><i class="fas fa-clock text-white"></i></div><div class="ml-3"><p class="text-sm text-gray-500">即将临期</p><p class="text-xl font-semibold" id="stat-near-expire">0</p></div></div></div>
                </div>

                <div class="border-b mb-6">
                    <nav class="flex space-x-6">
                        <button onclick="switchTab('ingredient')" id="tab-ingredient" class="py-3 px-1 border-b-2 border-blue-500 text-blue-600 text-sm font-medium">食材库</button>
                        <button onclick="switchTab('stock')" id="tab-stock" class="py-3 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700 text-sm font-medium">库存列表</button>
                        <button onclick="switchTab('flow')" id="tab-flow" class="py-3 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700 text-sm font-medium">出入库记录</button>
                    </nav>
                </div>

                <div id="content-ingredient">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex space-x-4">
                            <input type="text" id="search-ingredient-keyword" placeholder="搜索食材名称" class="pl-4 pr-4 py-2 border rounded-md w-64" oninput="loadIngredientList()">
                            <select id="filter-ingredient-category" class="px-3 py-2 border rounded-md" onchange="loadIngredientList()"><option value="">全部分类</option></select>
                            <select id="filter-ingredient-status" class="px-3 py-2 border rounded-md" onchange="loadIngredientList()"><option value="">全部状态</option><option value="enabled">启用</option><option value="disabled">禁用</option></select>
                        </div>
                        <button onclick="addIngredient()" class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700"><i class="fas fa-plus mr-1"></i>新增食材</button>
                    </div>
                    <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50"><tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">食材名称</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">分类</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">单位</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">采购单价</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">出成率</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">库存下限</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">库存上限</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">关联供应商</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                                </tr></thead>
                                <tbody class="bg-white divide-y divide-gray-200" id="ingredient-table"></tbody>
                            </table>
                        </div>
                        <div class="px-6 py-4 border-t flex justify-between"><span class="text-sm text-gray-500">共 <span id="ingredient-total">0</span> 条</span></div>
                    </div>
                </div>

                <div id="content-stock" class="hidden">
                    <div class="flex space-x-4 mb-4">
                        <input type="text" id="search-keyword" placeholder="搜索食材名称" class="pl-4 pr-4 py-2 border rounded-md w-64" onkeyup="loadInventoryList()">
                        <select id="filter-category" class="px-3 py-2 border rounded-md" onchange="loadInventoryList()"><option value="all">全部分类</option></select>
                        <select id="filter-status" class="px-3 py-2 border rounded-md" onchange="loadInventoryList()"><option value="all">全部状态</option><option value="normal">正常</option><option value="low">库存不足</option><option value="near_expire">即将临期</option><option value="expired">已过期</option></select>
                        <select id="filter-expire" class="px-3 py-2 border rounded-md" onchange="loadInventoryList()"><option value="all">临期筛选</option><option value="7">7天内到期</option><option value="3">3天内到期</option></select>
                    </div>
                    <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">食材名称</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">分类</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">当前库存</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">库存下限</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">库存上限</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">单位</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">单价</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">库存价值</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">有效期</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th></tr></thead>
                                <tbody class="bg-white divide-y divide-gray-200" id="inventory-table"></tbody>
                            </table>
                        </div>
                        <div class="px-6 py-4 border-t flex justify-between"><span class="text-sm text-gray-500">共 <span id="inventory-total">0</span> 条</span></div>
                    </div>
                </div>

                <div id="content-flow" class="hidden">
                    <div class="flex space-x-4 mb-4">
                        <input type="text" id="search-flow-keyword" placeholder="搜索食材名称" class="pl-4 pr-4 py-2 border rounded-md w-64" onkeyup="loadStockFlowList()">
                        <select id="filter-flow-type" class="px-3 py-2 border rounded-md" onchange="loadStockFlowList()"><option value="all">全部类型</option><option value="in">入库</option><option value="out">出库</option></select>
                        <input type="date" id="filter-date-start" class="px-3 py-2 border rounded-md" onchange="loadStockFlowList()">
                        <input type="date" id="filter-date-end" class="px-3 py-2 border rounded-md" onchange="loadStockFlowList()">
                    </div>
                    <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">记录ID</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">时间</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">类型</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">食材</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">数量</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">变动前库存</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">变动后库存</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">关联单号</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作人</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">备注</th></tr></thead>
                                <tbody class="bg-white divide-y divide-gray-200" id="stock-flow-table"></tbody>
                            </table>
                        </div>
                        <div class="px-6 py-4 border-t"><span class="text-sm text-gray-500">共 <span id="flow-total">0</span> 条</span></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="common-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between p-6 border-b"><h3 class="text-lg font-semibold" id="modal-title"></h3><button onclick="closeModal()" class="text-gray-400 hover:text-gray-500"><i class="fas fa-times text-xl"></i></button></div>
            <div class="p-6" id="modal-content"></div>
            <div class="flex justify-end p-6 border-t space-x-3"><button onclick="closeModal()" class="px-4 py-2 border rounded text-gray-700">取消</button><button id="modal-confirm-btn" class="px-4 py-2 bg-blue-600 text-white rounded">确认</button></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSidebar('inventory.html');
        });
    </script>
    <script src="js/inventory.js"></script>
</body>
</html>
