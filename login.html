<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食堂管理系统 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fef7ee',
                            100: '#fdedd7',
                            200: '#f9d5a8',
                            300: '#f4b76f',
                            400: '#ee8f34',
                            500: '#e97416',
                            600: '#da5a0c',
                            700: '#b6410c',
                            800: '#923511',
                            900: '#772d12',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delay': 'float 6s ease-in-out infinite 2s',
                        'float-delay-2': 'float 6s ease-in-out infinite 4s',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'bounce-slow': 'bounce 3s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .fade-in-delay {
            opacity: 0;
            animation: fadeIn 0.5s ease-out 0.2s forwards;
        }
        .fade-in-delay-2 {
            opacity: 0;
            animation: fadeIn 0.5s ease-out 0.4s forwards;
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(233, 116, 22, 0.2), 0 10px 15px -3px rgba(233, 116, 22, 0.1);
        }
        .btn-shadow {
            box-shadow: 0 10px 25px -5px rgba(233, 116, 22, 0.4), 0 10px 10px -5px rgba(233, 116, 22, 0.1);
        }
        .btn-shadow:hover {
            box-shadow: 0 15px 35px -5px rgba(233, 116, 22, 0.5), 0 10px 10px -5px rgba(233, 116, 22, 0.1);
        }
        .deco-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary-500 via-orange-500 to-primary-700 flex items-center justify-center p-4 overflow-hidden relative">
    <!-- 背景装饰 -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="deco-circle w-96 h-96 -top-48 -left-48 animate-pulse-slow"></div>
        <div class="deco-circle w-80 h-80 -bottom-40 -right-40 animate-pulse-slow" style="animation-delay: 2s;"></div>
        <div class="deco-circle w-64 h-64 top-1/2 left-1/4 animate-pulse-slow" style="animation-delay: 1s;"></div>
        
        <!-- 餐饮元素装饰 -->
        <div class="absolute top-20 left-10 text-white/20 text-6xl animate-float"><i class="fas fa-utensils"></i></div>
        <div class="absolute top-40 right-20 text-white/15 text-5xl animate-float-delay"><i class="fas fa-drumstick-bite"></i></div>
        <div class="absolute bottom-40 left-1/4 text-white/20 text-5xl animate-float-delay-2"><i class="fas fa-pepper-hot"></i></div>
        <div class="absolute bottom-20 right-1/3 text-white/15 text-4xl animate-float"><i class="fas fa-leaf"></i></div>
        <div class="absolute top-1/3 left-1/3 text-white/10 text-7xl animate-float-delay"><i class="fas fa-apple-whole"></i></div>
        <div class="absolute bottom-1/3 right-1/4 text-white/10 text-6xl animate-float-delay-2"><i class="fas fa-bread-slice"></i></div>
        <div class="absolute top-1/4 right-10 text-white/15 text-4xl animate-float"><i class="fas fa-fish"></i></div>
        <div class="absolute bottom-1/4 left-10 text-white/10 text-5xl animate-float-delay"><i class="fas fa-egg"></i></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo & 标题 -->
        <div class="text-center mb-8 fade-in">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white/20 backdrop-blur-sm rounded-3xl mb-4 shadow-2xl border border-white/30">
                <i class="fas fa-utensils text-white text-3xl"></i>
            </div>
            <h1 class="text-4xl font-bold text-white drop-shadow-lg tracking-wide">食堂管理系统</h1>
            <p class="text-white/80 mt-3 text-lg">高效管理 · 智慧餐饮 · 科学配餐</p>
        </div>

        <!-- 登录卡片 -->
        <div class="glass rounded-3xl shadow-2xl overflow-hidden fade-in-delay">
            <!-- Tab 切换 -->
            <div class="flex border-b border-gray-100 bg-gray-50/50">
                <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-5 text-center font-bold text-primary-600 border-b-3 border-primary-500 transition-all duration-300">
                    <i class="fas fa-sign-in-alt mr-2"></i>账号登录
                </button>
                <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-5 text-center font-bold text-gray-400 border-b-3 border-transparent hover:text-gray-600 transition-all duration-300">
                    <i class="fas fa-user-plus mr-2"></i>注册账号
                </button>
            </div>

            <!-- 登录表单 -->
            <div id="loginForm" class="p-8 fade-in">
                <div id="loginError" class="hidden mb-6 p-4 bg-red-50 border border-red-200 text-red-600 rounded-xl text-sm flex items-center animate-fadeIn">
                    <i class="fas fa-exclamation-circle mr-3 text-lg"></i>
                    <span id="loginErrorText" class="flex-1"></span>
                </div>
                <div id="loginSuccess" class="hidden mb-6 p-4 bg-green-50 border border-green-200 text-green-600 rounded-xl text-sm flex items-center animate-fadeIn">
                    <i class="fas fa-check-circle mr-3 text-lg"></i>
                    <span id="loginSuccessText" class="flex-1"></span>
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">用户名</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary-500 transition-colors">
                            <i class="fas fa-user text-lg"></i>
                        </span>
                        <input type="text" id="loginUsername" placeholder="请输入您的用户名" class="w-full pl-12 pr-4 py-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all duration-300 text-gray-700 placeholder-gray-400 bg-gray-50 focus:bg-white input-glow text-base">
                    </div>
                </div>
                <div class="mb-8">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">登录密码</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary-500 transition-colors">
                            <i class="fas fa-lock text-lg"></i>
                        </span>
                        <input type="password" id="loginPassword" placeholder="请输入您的密码" class="w-full pl-12 pr-4 py-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all duration-300 text-gray-700 placeholder-gray-400 bg-gray-50 focus:bg-white input-glow text-base">
                    </div>
                </div>
                <button onclick="handleLogin()" id="loginBtn" class="w-full py-4 bg-gradient-to-r from-primary-500 to-orange-500 text-white font-bold rounded-xl hover:from-primary-600 hover:to-orange-600 focus:ring-4 focus:ring-primary-200 transition-all duration-300 flex items-center justify-center text-lg btn-shadow transform hover:-translate-y-0.5 active:translate-y-0">
                    <span id="loginBtnText">立即登录</span>
                    <i id="loginBtnSpinner" class="fas fa-spinner fa-spin ml-3 hidden"></i>
                </button>
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" class="p-8 hidden fade-in">
                <div id="registerError" class="hidden mb-6 p-4 bg-red-50 border border-red-200 text-red-600 rounded-xl text-sm flex items-center animate-fadeIn">
                    <i class="fas fa-exclamation-circle mr-3 text-lg"></i>
                    <span id="registerErrorText" class="flex-1"></span>
                </div>
                <div id="registerSuccess" class="hidden mb-6 p-4 bg-green-50 border border-green-200 text-green-600 rounded-xl text-sm flex items-center animate-fadeIn">
                    <i class="fas fa-check-circle mr-3 text-lg"></i>
                    <span id="registerSuccessText" class="flex-1"></span>
                </div>
                
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">设置用户名</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary-500 transition-colors">
                            <i class="fas fa-user text-lg"></i>
                        </span>
                        <input type="text" id="regUsername" placeholder="请设置登录用户名" class="w-full pl-12 pr-4 py-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all duration-300 text-gray-700 placeholder-gray-400 bg-gray-50 focus:bg-white input-glow text-base">
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">设置密码</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary-500 transition-colors">
                            <i class="fas fa-lock text-lg"></i>
                        </span>
                        <input type="password" id="regPassword" placeholder="请设置登录密码（至少6位）" class="w-full pl-12 pr-4 py-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all duration-300 text-gray-700 placeholder-gray-400 bg-gray-50 focus:bg-white input-glow text-base">
                    </div>
                </div>
                <div class="mb-8">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">确认密码</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-primary-500 transition-colors">
                            <i class="fas fa-lock text-lg"></i>
                        </span>
                        <input type="password" id="regConfirmPassword" placeholder="请再次输入密码" class="w-full pl-12 pr-4 py-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all duration-300 text-gray-700 placeholder-gray-400 bg-gray-50 focus:bg-white input-glow text-base">
                    </div>
                </div>
                <button onclick="handleRegister()" id="registerBtn" class="w-full py-4 bg-gradient-to-r from-primary-500 to-orange-500 text-white font-bold rounded-xl hover:from-primary-600 hover:to-orange-600 focus:ring-4 focus:ring-primary-200 transition-all duration-300 flex items-center justify-center text-lg btn-shadow transform hover:-translate-y-0.5 active:translate-y-0">
                    <span id="registerBtnText">立即注册</span>
                    <i id="registerBtnSpinner" class="fas fa-spinner fa-spin ml-3 hidden"></i>
                </button>
            </div>
        </div>

        <!-- 底部 -->
        <p class="text-center text-white/60 text-sm mt-8 fade-in-delay-2">
            <i class="fas fa-coffee mr-1"></i>&copy; 2026 食堂管理系统 · 智慧餐饮解决方案 · All Rights Reserved
        </p>
    </div>

    <script>
        if (localStorage.getItem('canteen_token')) {
            window.location.href = 'index.html';
        }

        function switchTab(tab) {
            var loginForm = document.getElementById('loginForm');
            var registerForm = document.getElementById('registerForm');
            var tabLogin = document.getElementById('tabLogin');
            var tabRegister = document.getElementById('tabRegister');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabLogin.classList.add('text-primary-600', 'border-primary-500');
                tabLogin.classList.remove('text-gray-400', 'border-transparent');
                tabRegister.classList.remove('text-primary-600', 'border-primary-500');
                tabRegister.classList.add('text-gray-400', 'border-transparent');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabRegister.classList.add('text-primary-600', 'border-primary-500');
                tabRegister.classList.remove('text-gray-400', 'border-transparent');
                tabLogin.classList.remove('text-primary-600', 'border-primary-500');
                tabLogin.classList.add('text-gray-400', 'border-transparent');
            }

            hideAllMessages();
        }

        function hideAllMessages() {
            document.getElementById('loginError').classList.add('hidden');
            document.getElementById('loginSuccess').classList.add('hidden');
            document.getElementById('registerError').classList.add('hidden');
            document.getElementById('registerSuccess').classList.add('hidden');
        }

        function showLoginError(msg) {
            document.getElementById('loginErrorText').textContent = msg;
            document.getElementById('loginError').classList.remove('hidden');
            document.getElementById('loginSuccess').classList.add('hidden');
        }

        function showLoginSuccess(msg) {
            document.getElementById('loginSuccessText').textContent = msg;
            document.getElementById('loginSuccess').classList.remove('hidden');
            document.getElementById('loginError').classList.add('hidden');
        }

        function showRegisterError(msg) {
            document.getElementById('registerErrorText').textContent = msg;
            document.getElementById('registerError').classList.remove('hidden');
            document.getElementById('registerSuccess').classList.add('hidden');
        }

        function showRegisterSuccess(msg) {
            document.getElementById('registerSuccessText').textContent = msg;
            document.getElementById('registerSuccess').classList.remove('hidden');
            document.getElementById('registerError').classList.add('hidden');
        }

        function setLoginLoading(loading) {
            var btn = document.getElementById('loginBtn');
            var text = document.getElementById('loginBtnText');
            var spinner = document.getElementById('loginBtnSpinner');
            if (loading) {
                btn.disabled = true;
                btn.classList.add('opacity-70', 'cursor-not-allowed');
                text.textContent = '登录中...';
                spinner.classList.remove('hidden');
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                text.textContent = '立即登录';
                spinner.classList.add('hidden');
            }
        }

        function setRegisterLoading(loading) {
            var btn = document.getElementById('registerBtn');
            var text = document.getElementById('registerBtnText');
            var spinner = document.getElementById('registerBtnSpinner');
            if (loading) {
                btn.disabled = true;
                btn.classList.add('opacity-70', 'cursor-not-allowed');
                text.textContent = '注册中...';
                spinner.classList.remove('hidden');
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                text.textContent = '立即注册';
                spinner.classList.add('hidden');
            }
        }

        async function handleLogin() {
            hideAllMessages();
            var username = document.getElementById('loginUsername').value.trim();
            var password = document.getElementById('loginPassword').value.trim();

            if (!username) {
                showLoginError('请输入用户名');
                return;
            }
            if (!password) {
                showLoginError('请输入密码');
                return;
            }

            setLoginLoading(true);

            try {
                var response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                var data = await response.json();

                if (response.ok) {
                    localStorage.setItem('canteen_token', data.token);
                    localStorage.setItem('canteen_user', JSON.stringify(data.user));
                    showLoginSuccess('登录成功，正在跳转...');
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 800);
                } else {
                    showLoginError(data.message || '登录失败，请检查用户名和密码');
                }
            } catch (error) {
                showLoginError('网络错误，请稍后重试');
            } finally {
                setLoginLoading(false);
            }
        }

        async function handleRegister() {
            hideAllMessages();
            var username = document.getElementById('regUsername').value.trim();
            var password = document.getElementById('regPassword').value.trim();
            var confirmPassword = document.getElementById('regConfirmPassword').value.trim();

            if (!username) {
                showRegisterError('请输入用户名');
                return;
            }
            if (!password) {
                showRegisterError('请输入密码');
                return;
            }
            if (password.length < 6) {
                showRegisterError('密码长度不能少于6位');
                return;
            }
            if (password !== confirmPassword) {
                showRegisterError('两次输入的密码不一致');
                return;
            }

            setRegisterLoading(true);

            try {
                var response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        name: username,
                        phone: '',
                        orgName: '默认食堂'
                    })
                });

                var data = await response.json();

                if (response.ok) {
                    showRegisterSuccess('注册成功！即将跳转至登录页面...');
                    setTimeout(function() {
                        switchTab('login');
                        document.getElementById('loginUsername').value = username;
                    }, 1500);
                } else {
                    showRegisterError(data.message || '注册失败，请稍后重试');
                }
            } catch (error) {
                showRegisterError('网络错误，请稍后重试');
            } finally {
                setRegisterLoading(false);
            }
        }

        document.getElementById('loginPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleLogin();
        });

        document.getElementById('regConfirmPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleRegister();
        });
    </script>
</body>
</html>
