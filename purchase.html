<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购管理 - 食堂管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <aside class="w-64 bg-white shadow-md"><div class="p-4 border-b"><h1 class="text-xl font-bold text-gray-800"><i class="fas fa-utensils mr-2 text-blue-600"></i>食堂管理系统</h1></div><nav class="p-2" id="sidebar-nav"></nav></aside>
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm border-b flex-shrink-0">
                <div class="flex items-center justify-between p-4">
                    <div class="flex items-center"><h2 class="text-lg font-semibold text-gray-800">采购管理</h2><span class="ml-4 text-sm text-gray-500">采购订单、审批流程和入库登记</span></div>
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <i class="fas fa-bell text-xl text-gray-500"></i>
                            <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-4 h-4 flex items-center justify-center rounded-full" id="alert-count">0</span>
                        </div>
                        <div class="relative" id="user-dropdown-container">
                            <button onclick="toggleUserDropdown()" class="flex items-center space-x-2 hover:bg-gray-100 rounded-md py-2 px-3 transition-colors">
                                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
                                    <i class="fas fa-user text-blue-600"></i>
                                </div>
                                <span class="text-sm font-medium text-gray-700" id="current-user">管理员</span>
                                <i class="fas fa-chevron-down text-xs text-gray-500"></i>
                            </button>
                            <div id="user-dropdown" class="absolute right-0 top-full mt-1 w-48 bg-white rounded-md shadow-lg border hidden z-50">
                                <div class="py-1">
                                    <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 flex items-center">
                                        <i class="fas fa-sign-out-alt mr-2 text-red-500"></i> 退出登录
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            <main class="flex-1 overflow-y-auto p-6">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <button type="button" onclick="exportPurchaseData()" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-md text-sm text-gray-700 bg-white hover:bg-gray-50">
                            <i class="fas fa-download mr-2"></i>导出数据
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4 mb-6">
                    <div class="bg-white rounded-lg shadow-sm p-5"><div class="flex items-center"><div class="w-12 h-12 bg-blue-500 rounded-lg flex items-center justify-center"><i class="fas fa-file-alt text-white text-xl"></i></div><div class="ml-4"><p class="text-sm text-gray-500">本月采购单</p><p class="text-xl font-semibold" id="stat-month-count">0</p></div></div></div>
                    <div class="bg-white rounded-lg shadow-sm p-5"><div class="flex items-center"><div class="w-12 h-12 bg-red-500 rounded-lg flex items-center justify-center"><i class="fas fa-yen-sign text-white text-xl"></i></div><div class="ml-4"><p class="text-sm text-gray-500">本月采购金额</p><p class="text-xl font-semibold" id="stat-month-amount">¥0.00</p></div></div></div>
                    <div class="bg-white rounded-lg shadow-sm p-5"><div class="flex items-center"><div class="w-12 h-12 bg-yellow-500 rounded-lg flex items-center justify-center"><i class="fas fa-clock text-white text-xl"></i></div><div class="ml-4"><p class="text-sm text-gray-500">待审批采购单</p><p class="text-xl font-semibold" id="stat-pending-count">0</p></div></div></div>
                    <div class="bg-white rounded-lg shadow-sm p-5"><div class="flex items-center"><div class="w-12 h-12 bg-green-500 rounded-lg flex items-center justify-center"><i class="fas fa-truck text-white text-xl"></i></div><div class="ml-4"><p class="text-sm text-gray-500">待入库采购单</p><p class="text-xl font-semibold" id="stat-inbound-count">0</p></div></div></div>
                </div>

                <div class="bg-white rounded-lg shadow-sm p-5 mb-6">
                    <div class="grid grid-cols-4 gap-4">
                        <div><label class="block text-sm text-gray-600 mb-1">采购单状态</label><select id="filter-status" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500" onchange="loadPurchaseList()"><option value="all">全部状态</option><option value="pending_approval">待审批</option><option value="approved">已审批</option><option value="rejected">已驳回</option><option value="in_transit">配送中</option><option value="partial_received">部分入库</option><option value="completed">已完成</option><option value="cancelled">已取消</option></select></div>
                        <div><label class="block text-sm text-gray-600 mb-1">供应商</label><select id="filter-supplier" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500" onchange="loadPurchaseList()"><option value="all">全部供应商</option></select></div>
                        <div><label class="block text-sm text-gray-600 mb-1">开始日期</label><input type="date" id="filter-date-start" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500" onchange="loadPurchaseList()"></div>
                        <div><label class="block text-sm text-gray-600 mb-1">结束日期</label><input type="date" id="filter-date-end" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500" onchange="loadPurchaseList()"></div>
                    </div>
                    <div class="flex justify-between mt-4">
                        <button type="button" onclick="resetFilters()" class="px-4 py-2 border rounded text-sm text-gray-700 hover:bg-gray-50"><i class="fas fa-sync-alt mr-1"></i>重置筛选</button>
                        <div class="relative"><input type="text" id="search-keyword" class="pl-9 pr-3 py-2 border rounded text-sm focus:ring-2 focus:ring-blue-500" placeholder="搜索采购单编号/供应商..." onkeyup="loadPurchaseList()"><i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i></div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">采购单编号</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">供应商</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">创建日期</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">预计到货</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">关联菜谱</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">采购金额</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">创建人</th><th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">操作</th></tr></thead>
                            <tbody class="bg-white divide-y divide-gray-200" id="purchase-table"></tbody>
                        </table>
                    </div>
                    <div class="px-6 py-4 border-t flex items-center justify-between">
                        <span class="text-sm text-gray-500">共 <span id="purchase-total">0</span> 条</span>
                        <div class="flex space-x-2"><button class="px-3 py-1 border rounded text-sm hover:bg-gray-50" id="prev-page"><i class="fas fa-chevron-left"></i></button><button class="px-3 py-1 border rounded text-sm hover:bg-gray-50" id="next-page"><i class="fas fa-chevron-right"></i></button></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="common-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between p-6 border-b"><h3 class="text-lg font-semibold" id="modal-title"></h3><button onclick="closeModal()" class="text-gray-400 hover:text-gray-500"><i class="fas fa-times text-xl"></i></button></div>
            <div class="p-6" id="modal-content"></div>
            <div class="flex justify-end p-6 border-t space-x-3"><button onclick="closeModal()" class="px-4 py-2 border rounded text-gray-700">取消</button><button id="modal-confirm-btn" class="px-4 py-2 bg-blue-600 text-white rounded">确认</button></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/purchase.js"></script>
</body>
</html>
